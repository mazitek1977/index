<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Overlay Placar</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:transparent;
font-family:Arial;
overflow:hidden;
}

.scoreboard-wrap{
display:flex;
justify-content:center;
padding-top:16px;
}

.scoreboard{
min-width:1100px;
background:linear-gradient(180deg, rgba(18,18,18,0.97), rgba(5,5,5,0.94));
border-radius:18px;
overflow:hidden;
}

/* TOPO */
.series-bar{
display:grid;
grid-template-columns:1fr 260px 1fr;
min-height:56px;
background:rgba(255,255,255,0.05);
}

.top-info-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#141414;
}

/* 🔥 ALTERADO AQUI */
.mini-main{
color:white;
font-size:26px;
font-weight:900;
text-align:center;
}

/* 🔥 ALTERADO AQUI */
.mini-sub{
color:white;
font-size:14px;
text-align:center;
}

/* 🔥 ALTERADO AQUI */
.city-main{
font-size:22px;
font-weight:900;
}

.mini-label{
font-size:10px;
color:white;
opacity:.6;
}

/* SERIES */
.series-center-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:#111;
}

.series-label{
font-size:10px;
color:white;
}

.series-score{
display:flex;
gap:6px;
}

.series-box{
width:38px;
height:28px;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
}

.series-x{color:white}

/* PLACAR */
.top-bar{
display:grid;
grid-template-columns:1fr 260px 1fr;
}

.team{
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:28px;
font-weight:bold;
padding:10px;
}

.left{background:#1565c0}
.right{background:#ef6c00}

.center-score{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
background:#000;
}

.score-box{
width:70px;
height:70px;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
border-radius:10px;
}

.x-divider{color:white}

/* BOLAS */
.bottom-bar{
display:grid;
grid-template-columns:1fr 1fr;
background:#000;
padding:10px;
}

.balls-group{
display:flex;
justify-content:center;
gap:6px;
flex-wrap:wrap;
}

.ball{
width:28px;
height:28px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:12px;
color:white;
}

.hidden{display:none;}
</style>

</head>

<body>

<div class="scoreboard-wrap">
<div class="scoreboard">

<!-- TOPO -->
<div class="series-bar">

<div class="top-info-wrap">
<div class="mini-label">HORA</div>
<div class="mini-main" id="clockValue">00:00</div>
<div class="mini-sub" id="dateValue">01/01/2026</div>
</div>

<div class="series-center-wrap">
<div class="series-label">SÉRIES</div>
<div class="series-score">
<div class="series-box" id="series1">0</div>
<div class="series-x">X</div>
<div class="series-box" id="series2">0</div>
</div>
</div>

<div class="top-info-wrap">
<div class="mini-label">CIDADE</div>
<div class="mini-main city-main" id="cityValue">SÃO PAULO</div>
</div>

</div>

<!-- PLACAR -->
<div class="top-bar">
<div class="team left" id="name1">JOGADOR 1</div>

<div class="center-score">
<div class="score-box" id="score1">0</div>
<div class="x-divider">X</div>
<div class="score-box" id="score2">0</div>
</div>

<div class="team right" id="name2">JOGADOR 2</div>
</div>

<!-- BOLAS -->
<div class="bottom-bar hidden" id="bottomBar">
<div class="balls-group" id="balls1"></div>
<div class="balls-group" id="balls2"></div>
</div>

</div>
</div>

<script>
function updateClock(){
const now=new Date();

const time=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
const date=now.toLocaleDateString("pt-BR");

document.getElementById("clockValue").innerText=time;
document.getElementById("dateValue").innerText=date;
}

updateClock();
setInterval(updateClock,1000);
</script>

</body>
</html>
