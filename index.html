<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlay Placar Sinuca</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .scoreboard-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-top: 16px;
    }

    .scoreboard {
      min-width: 1100px;
      background: linear-gradient(180deg, rgba(18,18,18,0.97), rgba(5,5,5,0.94));
      border: 2px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    .series-bar {
      display: grid;
      grid-template-columns: 1fr 260px 1fr;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      min-height: 56px;
      padding: 4px 0;
    }

    .top-info-wrap {
      background: linear-gradient(180deg, #101010, #1b1b1b);
      border-left: 2px solid rgba(255,255,255,0.08);
      border-right: 2px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
      min-height: 48px;
    }

    .mini-label {
      color: white;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .mini-main {
      color: white;
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
    }

    /* Removido padding desnecessário do mini-sub se não for usado */
    .mini-sub {
      display: none; 
    }

    .city-main {
      font-size: 20px;
    }

    .series-center-wrap {
      background: linear-gradient(180deg, #101010, #1b1b1b);
      border-left: 2px solid rgba(255,255,255,0.08);
      border-right: 2px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .series-label {
      color: white;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .series-score {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .series-box {
      width: 38px;
      height: 28px;
      background: rgba(255, 255, 255, 0.05); /* Corrigido erro de sintaxe aqui */
      color: #FFD700;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .series-x {
      color: white;
      font-weight: 900;
      font-size: 12px;
      opacity: 0.9;
    }

    .top-bar {
      display: grid;
      grid-template-columns: 1fr 260px 1fr;
      align-items: stretch;
    }

    .team {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .team.left { background: linear-gradient(90deg, #1565c0, #1e88e5); }
    .team.right { background: linear-gradient(90deg, #ef6c00, #fb8c00); }

    .team-name {
      color: white;
      font-size: 40px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .center-score {
      background: linear-gradient(180deg, #101010, #1b1b1b);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-left: 2px solid rgba(255,255,255,0.08);
      border-right: 2px solid rgba(255,255,255,0.08);
    }

    .score-box {
      width: 75px;
      height: 75px;
      border-radius: 10px;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      font-weight: 900;
      box-shadow: inset 0 -4px 8px rgba(0,0,0,0.15);
    }

    .x-divider {
      color: white;
      font-size: 24px;
      font-weight: 900;
    }

    .bottom-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 12px 0;
      background: rgba(0,0,0,0.84);
    }

    .balls-group {
      display: flex;
      justify-content: center;
      gap: 8px;
      min-height: 34px;
    }

    .ball {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: inset 0 -3px 5px rgba(0,0,0,0.22), 0 2px 5px rgba(0,0,0,0.35);
      transition: all 0.2s ease;
    }

    .ball.off {
      opacity: 0.15;
      filter: grayscale(100%);
      transform: scale(0.85);
    }

    /* Cores das Bolas */
    .yellow { background: #fdd835; color: #111; }
    .blue   { background: #1e88e5; color: white; }
    .red    { background: #e53935; color: white; }
    .purple { background: #8e24aa; color: white; }
    .orange { background: #fb8c00; color: white; }
    .green  { background: #43a047; color: white; }
    .brown  { background: #6d4c41; color: white; }
    .black  { background: #111; color: white; }
    .wine   { background: #7b1f1f; color: white; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="scoreboard-wrap">
    <div class="scoreboard">
      <div class="series-bar" id="seriesBar">
        <div class="top-info-wrap">
          <div class="mini-label">HORA / DATA</div>
          <div class="mini-main" id="clockValue">--:--</div>
        </div>

        <div class="series-center-wrap">
          <div class="series-label" id="seriesLabel">SÉRIES</div>
          <div class="series-score">
            <div class="series-box" id="series1">0</div>
            <div class="series-x">X</div>
            <div class="series-box" id="series2">0</div>
          </div>
        </div>

        <div class="top-info-wrap">
          <div class="mini-label">CIDADE</div>
          <div class="mini-main city-main" id="cityValue">SÃO PAULO</div>
        </div>
      </div>

      <div class="top-bar">
        <div class="team left">
          <div class="team-name" id="name1">JOGADOR 1</div>
        </div>
        <div class="center-score">
          <div class="score-box" id="score1">0</div>
          <div class="x-divider">X</div>
          <div class="score-box" id="score2">0</div>
        </div>
        <div class="team right">
          <div class="team-name" id="name2">JOGADOR 2</div>
        </div>
      </div>

      <div class="bottom-bar hidden" id="bottomBar">
        <div class="balls-group" id="balls1"></div>
        <div class="balls-group" id="balls2"></div>
      </div>
    </div>
  </div>

  <script>
    const MODES = {
      vazio: null,
      par_impar: {
        player1: [2, 4, 6, 8, 10, 12, 14],
        player2: [3, 5, 7, 9, 11, 13, 15],
        final: 1
      },
      bola_8: {
        player1: [1, 2, 3, 4, 5, 6, 7],
        player2: [9, 10, 11, 12, 13, 14, 15],
        final: 8
      }
    };

    function getBallClass(num) {
      const colors = {
        1: "yellow", 9: "yellow",
        2: "blue", 10: "blue",
        3: "red", 11: "red",
        4: "purple", 12: "purple",
        5: "orange", 13: "orange",
        6: "green", 14: "green",
        7: "brown", 15: "wine",
        8: "black"
      };
      return colors[num] || "yellow";
    }

    function createBallHTML(number, player, isFinal = false) {
      const cls = `${getBallClass(number)} ${isFinal ? "final-ball hidden" : "normal-ball"}`;
      const id = isFinal ? `id="final${player}"` : "";
      return `<div class="ball ${cls}" ${id}>${number}</div>`;
    }

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      const date = now.toLocaleDateString("pt-BR");
      document.getElementById("clockValue").innerText = `${date} | ${time}`;
    }

    function renderOverlayFromStorage() {
      // Configurações Básicas
      const mode = localStorage.getItem("mazitek_mode") || "vazio";
      const conf = MODES[mode];
      const showSeries = localStorage.getItem("mazitek_show_series") !== "false";
      
      document.getElementById("seriesBar").style.display = showSeries ? "grid" : "none";
      document.getElementById("name1").innerText = localStorage.getItem("mazitek_name_1") || "JOGADOR 1";
      document.getElementById("name2").innerText = localStorage.getItem("mazitek_name_2") || "JOGADOR 2";
      document.getElementById("seriesLabel").innerText = localStorage.getItem("mazitek_series_label") || "SÉRIES";
      document.getElementById("cityValue").innerText = localStorage.getItem("mazitek_city") || "SÃO PAULO";

      // Scores
      const scores = JSON.parse(localStorage.getItem("mazitek_scores") || '{"1":0,"2":0}');
      const series = JSON.parse(localStorage.getItem("mazitek_series") || '{"1":0,"2":0}');
      document.getElementById("score1").innerText = scores[1] || 0;
      document.getElementById("score2").innerText = scores[2] || 0;
      document.getElementById("series1").innerText = series[1] || 0;
      document.getElementById("series2").innerText = series[2] || 0;

      // Lógica das Bolas
      const bottomBar = document.getElementById("bottomBar");
      if (!conf) {
        bottomBar.classList.add("hidden");
        return;
      }

      bottomBar.classList.remove("hidden");
      
      // Renderiza bolas apenas se necessário (otimização)
      const b1 = document.getElementById("balls1");
      const b2 = document.getElementById("balls2");
      
      b1.innerHTML = conf.player1.map(n => createBallHTML(n, 1)).join("") + createBallHTML(conf.final, 1, true);
      b2.innerHTML = conf.player2.map(n => createBallHTML(n, 2)).join("") + createBallHTML(conf.final, 2, true);

      // Aplica estados (apagada ou escondida)
      const savedBalls = JSON.parse(localStorage.getItem(`mazitek_ball_states_${mode}`) || '{}');
      [1, 2].forEach(player => {
        const ballEls = document.querySelectorAll(`#balls${player} .ball`);
        ballEls.forEach(ball => {
          const state = savedBalls[player]?.find(item => 
            item.text === ball.innerText && item.isFinal === (ball.id === `final${player}`)
          );
          if (state) {
            ball.classList.toggle("off", !!state.off);
            ball.classList.toggle("hidden", !!state.hidden);
          }
        });
      });
    }

    // Inicialização
    updateClock();
    renderOverlayFromStorage();

    // Listeners
    window.addEventListener("storage", renderOverlayFromStorage);
    setInterval(updateClock, 1000); // Relógio a cada 1s
    setInterval(renderOverlayFromStorage, 2000); // Polling de segurança mais lento
  </script>
</body>
</html>
