<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle do Placar - Mazitek</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: white; font-family: Arial, Helvetica, sans-serif; padding: 20px; }
    .panel {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .control-row {
      display: grid;
      grid-template-columns: 170px 1fr;
      gap: 12px;
      align-items: center;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .control-label { font-size: 14px; font-weight: 900; text-transform: uppercase; opacity: .9; }
    .control-box { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    input, select, button { height: 42px; border-radius: 10px; border: none; font-weight: 900; }
    input, select { background: #1b1b1b; color: white; border: 1px solid rgba(255,255,255,0.12); padding: 0 12px; min-width: 160px; }
    button { color: white; padding: 0 14px; cursor: pointer; transition: opacity 0.2s; }
    button:active { opacity: 0.7; }
    .btn-red { background: #c62828; }
    .btn-green { background: #2e7d32; }
    .btn-blue { background: #1565c0; }
    .btn-gray { background: #455a64; }
    .btn-orange { background: #ef6c00; }
    .ball-control-btn { min-width: 48px; }
    .ball-control-btn.off { opacity: 0.35; filter: grayscale(100%); }
    .ball-control-btn.final-control { border: 2px solid rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <div class="panel">
    <div class="control-row">
      <div class="control-label">Nomes</div>
      <div class="control-box">
        <input id="inputName1" placeholder="Jogador 1" />
        <button class="btn-blue" onclick="updateName(1)">OK J1</button>
        <input id="inputName2" placeholder="Jogador 2" />
        <button class="btn-orange" onclick="updateName(2)">OK J2</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Cidade</div>
      <div class="control-box">
        <input id="inputCity" placeholder="Cidade" />
        <button class="btn-blue" onclick="updateCity()">OK Cidade</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Modalidade</div>
      <div class="control-box">
        <select id="modeSelect" onchange="changeMode(this.value)">
          <option value="vazio">Sem modalidade</option>
          <option value="par_impar">Par ou Ímpar</option>
          <option value="bola_8">Bola 8</option>
        </select>
        <button class="btn-gray" onclick="resetAll()">Reset Geral</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Séries</div>
      <div class="control-box">
        <input id="inputSeriesLabel" placeholder="Texto da série" />
        <button class="btn-blue" onclick="updateSeriesLabel()">OK Texto</button>
        <button class="btn-red" onclick="changeSeries(1,-1)">➖ J1</button>
        <button class="btn-green" onclick="changeSeries(1,1)">➕ J1</button>
        <button class="btn-red" onclick="changeSeries(2,-1)">➖ J2</button>
        <button class="btn-green" onclick="changeSeries(2,1)">➕ J2</button>
        <button class="btn-gray" onclick="resetSeries()">Reset Série</button>
        <button class="btn-blue" onclick="toggleSeries()">MOSTRAR / OCULTAR</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Placar</div>
      <div class="control-box">
        <button class="btn-red" onclick="changeScore(1,-1)">➖ J1</button>
        <button class="btn-green" onclick="changeScore(1,1)">➕ J1</button>
        <button class="btn-red" onclick="changeScore(2,-1)">➖ J2</button>
        <button class="btn-green" onclick="changeScore(2,1)">➕ J2</button>
        <button class="btn-gray" onclick="resetScore()">Reset Score</button>
      </div>
    </div>

    <div class="control-row">
      <div class="control-label">Bolas J1</div>
      <div class="control-box" id="ballControls1"></div>
    </div>
    <div class="control-row">
      <div class="control-label">Bolas J2</div>
      <div class="control-box" id="ballControls2"></div>
    </div>

    <div class="control-row">
      <div class="control-label">Ações</div>
      <div class="control-box">
        <button class="btn-gray" onclick="resetBallsOnly()">Reset Apenas Bolas</button>
      </div>
    </div>
  </div>

  <script>
    const MODES = {
      vazio: null,
      par_impar: { player1: [2, 4, 6, 8, 10, 12, 14], player2: [3, 5, 7, 9, 11, 13, 15], final: 1 },
      bola_8: { player1: [1, 2, 3, 4, 5, 6, 7], player2: [9, 10, 11, 12, 13, 14, 15], final: 8 }
    };

    let currentMode = localStorage.getItem("mazitek_mode") || "vazio";
    let scores = JSON.parse(localStorage.getItem("mazitek_scores") || '{"1":0,"2":0}');
    let series = JSON.parse(localStorage.getItem("mazitek_series") || '{"1":0,"2":0}');

    function initDefaults() {
      if (!localStorage.getItem("mazitek_name_1")) localStorage.setItem("mazitek_name_1", "JOGADOR 1");
      if (!localStorage.getItem("mazitek_name_2")) localStorage.setItem("mazitek_name_2", "JOGADOR 2");
      if (!localStorage.getItem("mazitek_series_label")) localStorage.setItem("mazitek_series_label", "SÉRIES");
      if (!localStorage.getItem("mazitek_city")) localStorage.setItem("mazitek_city", "SÃO PAULO");
      if (!localStorage.getItem("mazitek_show_series")) localStorage.setItem("mazitek_show_series", "true");
    }

    function saveScores() { localStorage.setItem("mazitek_scores", JSON.stringify(scores)); }
    function saveSeries() { localStorage.setItem("mazitek_series", JSON.stringify(series)); }

    function updateName(p) {
      const el = document.getElementById("inputName" + p);
      if (el.value) {
        localStorage.setItem("mazitek_name_" + p, el.value.toUpperCase());
        el.placeholder = el.value.toUpperCase();
        el.value = "";
      }
    }

    function updateCity() {
      const el = document.getElementById("inputCity");
      if (el.value) {
        localStorage.setItem("mazitek_city", el.value.toUpperCase());
        el.placeholder = el.value.toUpperCase();
        el.value = "";
      }
    }

    function updateSeriesLabel() {
      const el = document.getElementById("inputSeriesLabel");
      if (el.value) {
        localStorage.setItem("mazitek_series_label", el.value.toUpperCase());
        el.placeholder = el.value.toUpperCase();
        el.value = "";
      }
    }

    function toggleSeries() {
      const current = localStorage.getItem("mazitek_show_series") === "true";
      localStorage.setItem("mazitek_show_series", !current);
      alert("Exibição da série: " + (!current ? "LIGADO" : "DESLIGADO"));
    }

    function changeScore(p, v) { scores[p] = Math.max(0, scores[p] + v); saveScores(); }
    function changeSeries(p, v) { series[p] = Math.max(0, series[p] + v); saveSeries(); }
    function resetScore() { scores = {1:0, 2:0}; saveScores(); }
    function resetSeries() { series = {1:0, 2:0}; saveSeries(); }

    function changeMode(mode) {
      currentMode = mode;
      localStorage.setItem("mazitek_mode", mode);
      resetScore();
      if (mode !== "vazio") resetBallsOnly();
      renderBallControls();
    }

    function getBallStates() {
      const key = `mazitek_ball_states_${currentMode}`;
      return JSON.parse(localStorage.getItem(key)) || {1:[], 2:[]};
    }

    function setBallStates(state) {
      localStorage.setItem(`mazitek_ball_states_${currentMode}`, JSON.stringify(state));
    }

    function renderBallControls() {
      const c1 = document.getElementById("ballControls1");
      const c2 = document.getElementById("ballControls2");
      c1.innerHTML = ""; c2.innerHTML = "";
      if (currentMode === "vazio") return;

      const mode = MODES[currentMode];
      const createBtn = (n, p, isFinal) => {
        const btn = document.createElement("button");
        btn.className = `ball-control-btn ${p===1?'btn-blue':'btn-orange'} ball-p${p} ${isFinal?'final-control':''}`;
        btn.id = `btn-p${p}-${n}${isFinal?'-f':''}`;
        btn.innerText = isFinal ? "F" : n;
        btn.onclick = () => isFinal ? toggleSpecificFinalBall(p) : toggleSpecificBall(p, n);
        return btn;
      };

      mode.player1.forEach(n => c1.appendChild(createBtn(n, 1, false)));
      c1.appendChild(createBtn(mode.final, 1, true));
      mode.player2.forEach(n => c2.appendChild(createBtn(n, 2, false)));
      c2.appendChild(createBtn(mode.final, 2, true));
      syncBallControlButtons();
    }

    function toggleSpecificBall(p, n) {
      const state = getBallStates();
      const ball = state[p].find(b => b.text == n && !b.isFinal);
      if (ball) {
        ball.off = !ball.off;
        const allNormalOff = state[p].filter(b => !b.isFinal).every(b => b.off);
        const final = state[p].find(b => b.isFinal);
        final.hidden = !allNormalOff;
        if (final.hidden) final.off = false;
        setBallStates(state);
        syncBallControlButtons();
      }
    }

    function toggleSpecificFinalBall(p) {
      const state = getBallStates();
      const final = state[p].find(b => b.isFinal);
      if (final && !final.hidden) {
        final.off = !final.off;
        setBallStates(state);
        syncBallControlButtons();
      }
    }

    function syncBallControlButtons() {
      const state = getBallStates();
      [1, 2].forEach(p => {
        state[p].forEach(b => {
          const btn = document.getElementById(`btn-p${p}-${b.text}${b.isFinal?'-f':''}`);
          if (btn) {
            btn.classList.toggle("off", b.off);
            if (b.isFinal) {
              btn.style.display = b.hidden ? "none" : "block";
            }
          }
        });
      });
    }

    function resetBallsOnly() {
      const mode = MODES[currentMode];
      if (!mode) return;
      const state = { 1: [], 2: [] };
      [1, 2].forEach(p => {
        const nums = p === 1 ? mode.player1 : mode.player2;
        nums.forEach(n => state[p].push({ text: String(n), off: false, hidden: false, isFinal: false }));
        state[p].push({ text: String(mode.final), off: false, hidden: true, isFinal: true });
      });
      setBallStates(state);
      renderBallControls();
    }

    function resetAll() {
      if (confirm("Resetar tudo?")) {
        resetScore(); resetSeries(); resetBallsOnly();
      }
    }

    initDefaults();
    renderBallControls();
  </script>
</body>
</html>
